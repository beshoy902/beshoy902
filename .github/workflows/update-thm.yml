name: Update TryHackMe Badge
on:
  schedule:
    - cron: '0 0 * * *' # Updates daily at midnight
  workflow_dispatch:     # Allows you to click a button to update it manually

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate TryHackMe Badge
        uses: geeekgod/tryhackme-badge-action@v1.0
        with:
          username: beshoy902 # Your THM username

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/thm_propic.png
          git commit -m "Update TryHackMe stats" || exit 0
          git push
